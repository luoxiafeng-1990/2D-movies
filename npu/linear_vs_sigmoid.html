<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>线性关系 vs 非线性关系 — 输入→输出的本质区别</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh}
.header{text-align:center;padding:20px 20px 8px;background:#0f1628}
.header h1{font-size:24px;color:#60a5fa}
.header p{color:#64748b;font-size:13px;margin-top:4px}
.main{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;padding:16px}
canvas{border-radius:10px;border:1px solid #1e293b;background:#0d1117;display:block}
.panel{width:420px;display:flex;flex-direction:column;gap:10px}
.card{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:14px}
.card h3{font-size:13px;color:#3b82f6;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.slider-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.slider-row label{font-size:13px;font-family:monospace;color:#fbbf24;min-width:50px}
.slider-row input[type=range]{flex:1;accent-color:#3b82f6}
.slider-row .val{font-size:14px;font-family:monospace;color:#f1f5f9;font-weight:700;min-width:45px;text-align:right}
table{width:100%;border-collapse:collapse;font-size:12px;font-family:monospace}
th{background:#1e293b;color:#94a3b8;padding:6px 4px;text-align:center;font-weight:600;border:1px solid #2d3748}
td{padding:5px 4px;text-align:center;border:1px solid #1e293b}
.step-btns{display:flex;justify-content:center;gap:8px;padding:10px}
.btn{padding:8px 20px;border:1px solid #334155;border-radius:6px;background:#1e293b;color:#e2e8f0;font-size:13px;cursor:pointer;transition:.15s}
.btn:hover{background:#334155;border-color:#60a5fa}
.btn.active{background:#2563eb;border-color:#3b82f6;color:#fff}
.explain{background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:14px;font-size:13px;line-height:1.8;color:#94a3b8;max-width:1100px;margin:0 auto}
.explain strong{color:#e2e8f0}
.explain .hl-blue{color:#60a5fa;font-weight:700}
.explain .hl-red{color:#f87171;font-weight:700}
.explain .hl-green{color:#4ade80;font-weight:700}
.dots{display:flex;gap:5px;justify-content:center;padding:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#1e293b;border:1px solid #334155;transition:.3s}
.dot.on{background:#3b82f6;border-color:#60a5fa;box-shadow:0 0 6px #3b82f680}
.dot.done{background:#1e3a5f;border-color:#3b82f6}
</style>
</head>
<body>
<div class="header">
<h1>线性关系 vs 非线性关系</h1>
<p>核心问题：输入 x 变化时，输出 z 是怎么跟着变的？是直线还是曲线？</p>
</div>

<div class="main">
<div>
<canvas id="cv" width="660" height="520"></canvas>
</div>
<div class="panel">

<div class="card">
<h3>参数设置</h3>
<div class="slider-row"><label>w₁ =</label><input type="range" id="rw1" min="-3" max="3" step="0.1" value="1"><span class="val" id="vw1">1.0</span></div>
<div class="slider-row"><label>w₂ =</label><input type="range" id="rw2" min="-3" max="3" step="0.1" value="1"><span class="val" id="vw2">1.0</span></div>
<div class="slider-row"><label>b =</label><input type="range" id="rb" min="-3" max="3" step="0.1" value="0"><span class="val" id="vb">0.0</span></div>
<div class="slider-row"><label style="color:#94a3b8">固定 x₂ =</label><input type="range" id="rx2" min="-3" max="3" step="0.5" value="0"><span class="val" id="vx2" style="color:#a78bfa">0.0</span></div>
</div>

<div class="card">
<h3>数值计算表 — x₁ 从 -3 到 3</h3>
<div style="overflow-y:auto;max-height:310px">
<table><thead><tr>
<th>x₁</th><th>x₂</th>
<th id="th_layer1">第1层 z₁</th>
<th id="th_act" style="display:none">sigmoid(z₁)</th>
<th id="th_layer2" style="display:none">第2层 z</th>
<th>最终输出 z</th>
</tr></thead><tbody id="tbl"></tbody></table>
</div>
</div>

</div>
</div>

<div class="dots" id="dots"></div>
<div class="step-btns">
<button class="btn" onclick="prev()">◀ 上一步</button>
<button class="btn active" onclick="next()">下一步 ▶</button>
</div>
<div class="explain" id="exp"></div>

<script>
const sigmoid=z=>1/(1+Math.exp(-z));
const CV=document.getElementById('cv'),ctx=CV.getContext('2d');
const W=660,H=520;
const MG={l:65,r:25,t:35,b:50};
const PW=W-MG.l-MG.r,PH=H-MG.t-MG.b;

// ===== Steps =====
const steps=[
  {
    title:'单层线性：z = w₁·x₁ + w₂·x₂ + b',
    mode:'linear1',
    w1:1,w2:1,b:0,x2:0,
    exp:`<strong>最基础的情况</strong>：一个神经元，做一次加权求和。<br><br>
公式：<span class="hl-blue">z = 1.0·x₁ + 1.0·x₂ + 0</span><br>
固定 x₂ = 0，那就变成 <span class="hl-blue">z = 1.0·x₁</span><br><br>
看左边的图：横轴是输入 x₁，纵轴是输出 z。<br>
x₁ 每增加 1，z 就增加 1。<strong>均匀增长，画出来是一条直线</strong>。<br><br>
这就是<strong>线性关系</strong>：输入和输出之间的变化是均匀的、成比例的。`
  },
  {
    title:'改变权重：z = 2·x₁ + 1·x₂ - 1',
    mode:'linear1',
    w1:2,w2:1,b:-1,x2:0,
    exp:`权重从 1.0 改成 2.0，偏置改成 -1。<br><br>
公式变为：<span class="hl-blue">z = 2.0·x₁ + 1.0·0 + (-1) = 2x₁ - 1</span><br><br>
看图：还是直线！但斜率变了（更陡了），截距也变了。<br><br>
<strong>关键</strong>：不管 w₁、w₂、b 怎么改，z 和 x₁ 之间<strong>永远是直线</strong>。<br>
因为 z = w₁·x₁ + 常数，这就是 y = ax + b 的形式。`
  },
  {
    title:'叠加第二层（无激活）',
    mode:'linear2',
    w1:1,w2:1,b:0,x2:0,
    exp:`现在叠加第二层：<br><br>
第1层：<span class="hl-blue">h = 1.0·x₁ + 1.0·0 + 0 = x₁</span> （蓝色虚线）<br>
第2层：<span class="hl-red">z = 2.0·h + 1.0 = 2·x₁ + 1</span> （红色实线）<br><br>
看图：蓝色虚线是第1层的结果 h，红色实线是第2层的最终结果 z。<br><br>
<strong>两条都是直线！</strong>第2层只是把第1层的直线"拉伸"了一下（乘以2再加1），<br>
但直线拉伸后还是直线。<br><br>
看计算表：最终输出 z = 2x₁+1，这和直接用一层 z = 2x₁+1 的结果<strong>完全一样</strong>。<br>
<span class="hl-red">两层网络 = 一层网络，白叠了。</span>`
  },
  {
    title:'三层叠加（无激活）— 还是直线',
    mode:'linear3',
    w1:1,w2:1,b:0,x2:0,
    exp:`再加第三层：<br><br>
第1层：h₁ = x₁ （蓝色虚线）<br>
第2层：h₂ = 2·h₁ + 1 = 2x₁+1 （橙色虚线）<br>
第3层：<span class="hl-red">z = 0.5·h₂ - 2 = 0.5·(2x₁+1) - 2 = x₁ - 1.5</span> （红色实线）<br><br>
三层嵌套，最终结果 z = x₁ - 1.5，<strong>还是一条直线</strong>。<br><br>
数学原理很简单：直线套直线套直线 = 还是直线。<br>
就像放大2倍再放大3倍再缩小一半 = 放大3倍，一步就能做到。<br><br>
<span class="hl-red">结论：没有激活函数，叠多少层都等价于一层。</span>`
  },
  {
    title:'加上 sigmoid！— 直线变曲线',
    mode:'sigmoid1',
    w1:1,w2:1,b:0,x2:0,
    exp:`<strong>关键时刻</strong>：在第1层加权求和之后，插入 sigmoid 函数。<br><br>
第1层加权求和：z₁ = 1.0·x₁ + 0 = x₁ （蓝色虚线，还是直线）<br>
经过 sigmoid：<span class="hl-green">h = sigmoid(x₁)</span> （绿色实线，<strong>S形曲线！</strong>）<br><br>
看图的变化：<br>
• x₁ 在 -3 到 -1 时，h ≈ 0（被压到底部）<br>
• x₁ 在 -1 到 1 时，h 快速上升（S形的陡峭段）<br>
• x₁ 在 1 到 3 时，h ≈ 1（被压到顶部）<br><br>
<strong>这不再是均匀增长了</strong>——x₁ 增加 1，z 的变化量不固定。<br>
这就是<span class="hl-green">非线性</span>：输入和输出之间的变化不再是均匀的。`
  },
  {
    title:'两层 + sigmoid — 产生复杂曲线',
    mode:'sigmoid2',
    w1:3,w2:1,b:0,x2:0,
    exp:`现在看两层网络 + sigmoid 的效果：<br><br>
第1层：z₁ = 3·x₁ （蓝色虚线，直线）<br>
sigmoid：h = σ(3·x₁) （绿色虚线，S形曲线）<br>
第2层：<span class="hl-green">z = 4·h - 2 = 4·σ(3x₁) - 2</span> （绿色实线，<strong>拉伸后的S曲线</strong>）<br><br>
对比上一步（红色虚线是没有 sigmoid 的结果 z=12x₁-2）：<br>
• 红色虚线：<span class="hl-red">直线</span>，z 从 -38 到 +34，无限增长<br>
• 绿色实线：<span class="hl-green">曲线</span>，z 被压在 -2 到 +2 之间，有上下限<br><br>
<strong>sigmoid 让输出不再是无限均匀增长，而是有了"饱和"效果</strong>。<br>
这种非线性才能让网络学到复杂的模式。`
  },
  {
    title:'核心对比 — 直线 vs 曲线',
    mode:'compare',
    w1:2,w2:1,b:-1,x2:0,
    exp:`<strong>最终对比</strong>，同样的权重 w₁=2, b=-1：<br><br>
<span class="hl-red">红色直线</span>：无激活函数，z = 2x₁ - 1<br>
→ x₁ 每增加1，z 永远增加2。均匀、等比例、<strong>直线</strong>。<br><br>
<span class="hl-green">绿色曲线</span>：有 sigmoid，z = sigmoid(2x₁ - 1)<br>
→ x₁ 从0到1时 z 增加很多，从2到3时 z 几乎不变。不均匀、<strong>曲线</strong>。<br><br>
<strong>这就是全部答案：</strong><br>
• 线性关系 = 输入 x 和输出 z 之间是<span class="hl-red">直线</span>（均匀变化）<br>
• 非线性关系 = 输入 x 和输出 z 之间是<span class="hl-green">曲线</span>（不均匀变化）<br>
• 没有激活函数 → 不管多少层，x→z 永远是直线<br>
• 有了 sigmoid → x→z 变成曲线，每多一层曲线就更复杂`
  },
];

let curStep=0;

// ===== Drawing =====
function xToP(x){return MG.l+(x-(-3.5))/(3.5-(-3.5))*PW}
function zToP(z,zMin,zMax){return MG.t+(1-(z-zMin)/(zMax-zMin))*PH}

function drawAxes(zMin,zMax,zLabel){
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
  // grid
  for(let x=-3;x<=3;x++){
    const px=xToP(x);ctx.strokeStyle=x===0?'#334155':'#151d2e';ctx.lineWidth=x===0?1.5:0.7;
    ctx.beginPath();ctx.moveTo(px,MG.t);ctx.lineTo(px,MG.t+PH);ctx.stroke();
  }
  const zStep=Math.max(1,Math.round((zMax-zMin)/8));
  for(let z=Math.ceil(zMin);z<=Math.floor(zMax);z+=zStep){
    const py=zToP(z,zMin,zMax);ctx.strokeStyle=z===0?'#334155':'#151d2e';ctx.lineWidth=z===0?1.5:0.7;
    ctx.beginPath();ctx.moveTo(MG.l,py);ctx.lineTo(MG.l+PW,py);ctx.stroke();
  }
  // axis labels
  ctx.fillStyle='#8b9dc3';ctx.font='12px monospace';ctx.textAlign='center';ctx.textBaseline='top';
  for(let x=-3;x<=3;x++){ctx.fillText(x,xToP(x),MG.t+PH+6)}
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let z=Math.ceil(zMin);z<=Math.floor(zMax);z+=zStep){ctx.fillText(z,MG.l-8,zToP(z,zMin,zMax))}
  // names
  ctx.fillStyle='#60a5fa';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
  ctx.fillText('输入 x₁',MG.l+PW/2,H-10);
  // vertical label drawn char by char to avoid rotated CJK rendering issues
  const vl=(zLabel||'输出 z').split('');
  ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  const vlStartY=MG.t+PH/2-vl.length*9;
  vl.forEach((ch,i)=>{ctx.fillText(ch,16,vlStartY+i*18)});
}

function plotLine(pts,color,width,dash){
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=width||2.5;
  if(dash)ctx.setLineDash(dash);
  ctx.beginPath();
  pts.forEach(([x,y],i)=>{if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});
  ctx.stroke();ctx.restore();
}

function plotPoints(pts,color,radius){
  pts.forEach(([x,y,label])=>{
    ctx.beginPath();ctx.arc(x,y,radius||4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    if(label!==undefined){
      ctx.fillStyle='#e2e8f0';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(label,x,y-7);
    }
  });
}

function addLegend(items,y){
  let x=MG.l+10;
  items.forEach(([color,text,dash])=>{
    ctx.strokeStyle=color;ctx.lineWidth=2.5;
    if(dash)ctx.setLineDash(dash);else ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+30,y);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#cbd5e1';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(text,x+35,y);
    x+=ctx.measureText(text).width+55;
  });
}

// ===== Compute & Render =====
function render(){
  const s=steps[curStep];
  const mode=s.mode;
  const w1=parseFloat(document.getElementById('rw1').value);
  const w2=parseFloat(document.getElementById('rw2').value);
  const b=parseFloat(document.getElementById('rb').value);
  const x2=parseFloat(document.getElementById('rx2').value);

  const xs=[];for(let x=-3;x<=3;x+=0.05)xs.push(x);
  const xSample=[-3,-2,-1,0,1,2,3];

  let zMin,zMax,curves=[],tableRows=[],legends=[];

  if(mode==='linear1'){
    const zs=xs.map(x=>w1*x+w2*x2+b);
    zMin=Math.min(-1,...zs)-0.5;zMax=Math.max(1,...zs)+0.5;
    curves=[{xs,zs,color:'#3b82f6',width:3,dash:null,label:'z = w₁·x₁ + w₂·x₂ + b'}];
    legends=[['#3b82f6','z = '+w1.toFixed(1)+'·x₁ + '+w2.toFixed(1)+'·'+x2.toFixed(1)+' + '+b.toFixed(1)+' （直线）']];
    tableRows=xSample.map(x=>{const z=w1*x+w2*x2+b;return{x1:x,x2,cols:[z.toFixed(2)],z:z.toFixed(2)}});
    document.getElementById('th_layer1').textContent='z = w₁·x₁+w₂·x₂+b';
    document.getElementById('th_act').style.display='none';
    document.getElementById('th_layer2').style.display='none';
  }
  else if(mode==='linear2'){
    const h_s=xs.map(x=>1*x+1*x2+0);
    const z_s=xs.map((_,i)=>2*h_s[i]+1);
    zMin=Math.min(-1,...z_s,...h_s)-0.5;zMax=Math.max(1,...z_s,...h_s)+0.5;
    curves=[
      {xs,zs:h_s,color:'#3b82f6',width:2,dash:[8,4],label:'第1层 h'},
      {xs,zs:z_s,color:'#ef4444',width:3,dash:null,label:'第2层 z'},
    ];
    legends=[['#3b82f6','第1层 h = x₁ （直线）',[8,4]],['#ef4444','第2层 z = 2h+1 = 2x₁+1 （还是直线！）']];
    tableRows=xSample.map(x=>{const h=1*x+1*x2+0;const z=2*h+1;return{x1:x,x2,cols:[h.toFixed(2),z.toFixed(2)],z:z.toFixed(2)}});
    document.getElementById('th_layer1').textContent='第1层 h=x₁';
    document.getElementById('th_act').style.display='none';
    document.getElementById('th_layer2').style.display='';
    document.getElementById('th_layer2').textContent='第2层 z=2h+1';
  }
  else if(mode==='linear3'){
    const h1_s=xs.map(x=>x);
    const h2_s=xs.map((_,i)=>2*h1_s[i]+1);
    const z_s=xs.map((_,i)=>0.5*h2_s[i]-2);
    zMin=Math.min(-1,...z_s,...h1_s,...h2_s)-0.5;zMax=Math.max(1,...z_s,...h1_s,...h2_s)+0.5;
    curves=[
      {xs,zs:h1_s,color:'#3b82f6',width:1.5,dash:[8,4]},
      {xs,zs:h2_s,color:'#fb923c',width:1.5,dash:[6,3]},
      {xs,zs:z_s,color:'#ef4444',width:3,dash:null},
    ];
    legends=[['#3b82f6','h₁=x₁',[8,4]],['#fb923c','h₂=2h₁+1',[6,3]],['#ef4444','z=0.5h₂-2 = x₁-1.5']];
    tableRows=xSample.map(x=>{const h1=x;const h2=2*h1+1;const z=0.5*h2-2;return{x1:x,x2,cols:[h1.toFixed(1),h2.toFixed(1),z.toFixed(2)],z:z.toFixed(2)}});
    document.getElementById('th_layer1').textContent='h₁=x₁';
    document.getElementById('th_act').style.display='';
    document.getElementById('th_act').textContent='h₂=2h₁+1';
    document.getElementById('th_layer2').style.display='';
    document.getElementById('th_layer2').textContent='z=0.5h₂-2';
  }
  else if(mode==='sigmoid1'){
    const z1_s=xs.map(x=>w1*x+w2*x2+b);
    const h_s=z1_s.map(z=>sigmoid(z));
    zMin=-0.3;zMax=1.3;
    const z1min=Math.min(...z1_s),z1max=Math.max(...z1_s);
    curves=[
      {xs,zs:z1_s.map(z=>(z-z1min)/(z1max-z1min)*(zMax-zMin)+zMin),color:'#3b82f6',width:1.5,dash:[8,4],noPoints:true},
      {xs,zs:h_s,color:'#4ade80',width:3,dash:null},
    ];
    legends=[['#3b82f6','z₁ = x₁ （直线，已缩放）',[8,4]],['#4ade80','h = sigmoid(x₁) （S曲线！）']];
    tableRows=xSample.map(x=>{const z1=w1*x+w2*x2+b;const h=sigmoid(z1);return{x1:x,x2,cols:[z1.toFixed(2),h.toFixed(4)],z:h.toFixed(4)}});
    document.getElementById('th_layer1').textContent='z₁ = w₁x₁+b';
    document.getElementById('th_act').style.display='';
    document.getElementById('th_act').textContent='sigmoid(z₁)';
    document.getElementById('th_layer2').style.display='none';
  }
  else if(mode==='sigmoid2'){
    const z1_s=xs.map(x=>w1*x+w2*x2+b);
    const h_s=z1_s.map(z=>sigmoid(z));
    const z_s=h_s.map(h=>4*h-2);
    const zLin_s=xs.map(x=>4*(w1*x+w2*x2+b)-2);
    zMin=Math.min(-3,...z_s)-0.5;zMax=Math.max(3,...z_s)+0.5;
    curves=[
      {xs,zs:zLin_s.map(z=>Math.max(zMin,Math.min(zMax,z))),color:'#ef4444',width:1.5,dash:[8,4]},
      {xs,zs:z_s,color:'#4ade80',width:3,dash:null},
    ];
    legends=[['#ef4444','无sigmoid: z=4·('+w1+'x₁+'+b+')-2 （直线）',[8,4]],['#4ade80','有sigmoid: z=4·σ('+w1+'x₁+'+b+')-2 （曲线）']];
    tableRows=xSample.map(x=>{const z1=w1*x+w2*x2+b;const h=sigmoid(z1);const z=4*h-2;return{x1:x,x2,cols:[z1.toFixed(1),h.toFixed(3)],z:z.toFixed(2)}});
    document.getElementById('th_layer1').textContent='z₁ (加权和)';
    document.getElementById('th_act').style.display='';
    document.getElementById('th_act').textContent='σ(z₁)';
    document.getElementById('th_layer2').style.display='none';
  }
  else if(mode==='compare'){
    const zLin=xs.map(x=>w1*x+w2*x2+b);
    const zSig=xs.map(x=>sigmoid(w1*x+w2*x2+b));
    zMin=Math.min(-0.5,...zLin);zMax=Math.max(1.5,...zLin);
    curves=[
      {xs,zs:zLin,color:'#ef4444',width:2.5,dash:null},
      {xs,zs:zSig,color:'#4ade80',width:2.5,dash:null},
    ];
    legends=[['#ef4444','无激活: z = '+w1+'x₁+'+b+' （直线）'],['#4ade80','有sigmoid: z = σ('+w1+'x₁+'+b+') （曲线）']];
    zMin=Math.min(zMin,-0.5);zMax=Math.max(zMax,1.5);
    tableRows=xSample.map(x=>{const zl=w1*x+w2*x2+b;const zs=sigmoid(zl);return{x1:x,x2,cols:[zl.toFixed(2),zs.toFixed(4)],z:zs.toFixed(4)}});
    document.getElementById('th_layer1').textContent='无激活 z';
    document.getElementById('th_act').style.display='';
    document.getElementById('th_act').textContent='有sigmoid z';
    document.getElementById('th_layer2').style.display='none';
  }

  // Draw
  drawAxes(zMin,zMax,'输出 z');
  curves.forEach(c=>{
    const pts=c.xs.map((x,i)=>[xToP(x),zToP(c.zs[i],zMin,zMax)]);
    plotLine(pts,c.color,c.width,c.dash);
    if(!c.noPoints){
      const samplePts=xSample.map(x=>{
        const idx=c.xs.findIndex(v=>Math.abs(v-x)<0.03);
        if(idx<0)return null;
        return[xToP(x),zToP(c.zs[idx],zMin,zMax),c.zs[idx].toFixed(1)];
      }).filter(Boolean);
      plotPoints(samplePts,c.color,4);
    }
  });
  addLegend(legends,MG.t+14);

  // Title on canvas
  ctx.fillStyle='#f1f5f9';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  ctx.fillText(s.title,W/2,18);

  // Table
  const tbody=document.getElementById('tbl');
  tbody.innerHTML='';
  tableRows.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${r.x1}</td><td style="color:#a78bfa">${r.x2}</td>`
      +r.cols.map(c=>`<td>${c}</td>`).join('')
      +`<td style="font-weight:700;color:#fbbf24">${r.z}</td>`;
    tbody.appendChild(tr);
  });

  // Explain
  document.getElementById('exp').innerHTML=s.exp;

  // Dots
  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML='';
  steps.forEach((_,i)=>{const d=document.createElement('span');d.className='dot'+(i<curStep?' done':'')+(i===curStep?' on':'');dotsEl.appendChild(d)});
}

function setPreset(){
  const s=steps[curStep];
  if(s.w1!==undefined)document.getElementById('rw1').value=s.w1;
  if(s.w2!==undefined)document.getElementById('rw2').value=s.w2;
  if(s.b!==undefined)document.getElementById('rb').value=s.b;
  if(s.x2!==undefined)document.getElementById('rx2').value=s.x2;
  ['rw1','rw2','rb','rx2'].forEach(id=>{
    const el=document.getElementById(id);
    document.getElementById('v'+id.slice(1)).textContent=parseFloat(el.value).toFixed(1);
  });
}

function next(){if(curStep<steps.length-1){curStep++;setPreset();render()}}
function prev(){if(curStep>0){curStep--;setPreset();render()}}

['rw1','rw2','rb','rx2'].forEach(id=>{
  document.getElementById(id).addEventListener('input',e=>{
    document.getElementById('v'+id.slice(1)).textContent=parseFloat(e.target.value).toFixed(1);
    render();
  });
});

setPreset();render();
</script>
</body>
</html>
